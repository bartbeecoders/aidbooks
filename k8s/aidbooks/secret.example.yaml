# AidBooks api Secret — TEMPLATE.
#
# Copy this file to `secret.yaml`, fill in real values, and apply with:
#
#   kubectl apply -f k8s/aidbooks/secret.yaml
#
# The real `secret.yaml` is gitignored. NEVER commit live credentials.
#
# Generation tips:
#   LISTENAI_JWT_SECRET / LISTENAI_PASSWORD_PEPPER:
#     openssl rand -hex 32
#
# stringData (vs. data) lets us paste raw values; k8s base64-encodes them
# for us on apply.
apiVersion: v1
kind: Secret
metadata:
  name: aidbooks-api-secret
  namespace: aidbooks
type: Opaque
stringData:
  # --- Auth (REQUIRED) ---
  # 32-byte hex strings. Rotate jwt_secret = invalidates every active
  # access token; rotate password_pepper = invalidates every refresh
  # token at rest. Don't rotate without a plan.
  LISTENAI_JWT_SECRET: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  LISTENAI_PASSWORD_PEPPER: "REPLACE_WITH_OPENSSL_RAND_HEX_32"

  # --- LLM (OpenRouter) ---
  # Empty = mock mode. NEVER leave empty in prod — users get fabricated
  # outlines.
  LISTENAI_OPENROUTER_API_KEY: ""

  # --- TTS (xAI) ---
  # Empty = mock mode (silent audio scaled to text length). NEVER leave
  # empty in prod.
  LISTENAI_XAI_API_KEY: ""

  # --- YouTube publishing (optional) ---
  # Leave empty to disable the YouTube publish pipeline entirely. The
  # client id/secret come from a Google Cloud project that owns the
  # `youtube.upload` scope. The redirect URI is in the ConfigMap.
  LISTENAI_YOUTUBE_CLIENT_ID: ""
  LISTENAI_YOUTUBE_CLIENT_SECRET: ""
