# AidBooks frontend nginx config.
#
# - Static SPA from /usr/share/nginx/html with HTML5 history-mode fallback.
# - /api/*  → strips the prefix and proxies to the api Service inside the
#            cluster. Mirrors the dev-server proxy in vite.config.ts so the
#            same code path works in dev and prod.
# - /api/ws/* → same as above plus WebSocket upgrade headers.
#
# Cloudflare tunnel terminates TLS and forwards plain HTTP to the NodePort,
# so we listen on :80 only. Real client IPs arrive in CF-Connecting-IP if
# the backend ever needs them.

# WebSocket upgrade map — `Connection: upgrade` only when the client
# actually requested an upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# In-cluster DNS name of the api Service. Resolved at config-load by nginx,
# which is fine because the Service IP is stable for the lifetime of the
# Service object. If the api gets re-created (rare), nginx pods restart with
# the rolling update.
upstream aidbooks_api {
    server aidbooks-api:8787;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # Generated bundles are content-hashed; cache them aggressively.
    location /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy. Note: the trailing slash on `proxy_pass` strips the /api
    # prefix from the upstream URI, matching the dev-server `rewrite` rule
    # in vite.config.ts.
    location /api/ {
        proxy_pass http://aidbooks_api/;
        proxy_http_version 1.1;

        # WebSocket upgrade. nginx is happy to leave these headers in place
        # for non-WS requests too — they're only acted on when the client
        # sends `Upgrade: websocket`.
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host   $host;

        # Generous timeouts for the synchronous LLM/translate handlers
        # (they can run up to ~180s). Match LISTENAI_REQUEST_TIMEOUT_SECS.
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # WS connections may stay open for a long while; nginx defaults
        # of 60s would kill the progress hub.
        proxy_buffering off;
    }

    # SPA: serve index.html for any path that doesn't match a real file.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # index.html itself must never be cached or users get stuck on
        # stale builds after a deploy.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
    }

    # Tiny health endpoint so the deployment liveness probe stays inside
    # the pod (no need to round-trip through the api Service).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
