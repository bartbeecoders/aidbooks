name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all
      - run: cargo build --release

  frontend:
    name: Frontend (Vite + TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test --if-present

  # -----------------------------------------------------------------------
  # Deploy to the K3s VPS on every push to main, once CI passes.
  #
  # Required repository secrets (Settings → Secrets and variables → Actions):
  #   REGISTRY_USER       Azure Container Registry username
  #   REGISTRY_PASSWORD   Azure Container Registry password / token
  #   VPS_HOST            VPS IP or DNS (e.g. 212.47.77.32)
  #   VPS_USER            SSH user on the VPS (e.g. bart)
  #   VPS_SSH_KEY         Private SSH key (full PEM, including BEGIN/END lines)
  #                       authorised for VPS_USER on VPS_HOST.
  #   VPS_KNOWN_HOSTS     Output of `ssh-keyscan <VPS_HOST>` for host pinning.
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to K3s
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      # Serialize deploys so two pushes in quick succession can't race
      # rollout-restarts on the cluster.
      group: deploy-k3s
      cancel-in-progress: false
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag from backend/Cargo.toml
        id: tag
        run: |
          version=$(grep -m1 -E '^version' backend/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "$version" ]]; then
            echo "could not parse version from backend/Cargo.toml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: beecodersregistry.azurecr.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          pull: true
          tags: |
            beecodersregistry.azurecr.io/aidbooks-api:latest
            beecodersregistry.azurecr.io/aidbooks-api:${{ steps.tag.outputs.version }}
          cache-from: type=gha,scope=aidbooks-api
          cache-to: type=gha,mode=max,scope=aidbooks-api

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          pull: true
          tags: |
            beecodersregistry.azurecr.io/aidbooks-frontend:latest
            beecodersregistry.azurecr.io/aidbooks-frontend:${{ steps.tag.outputs.version }}
          cache-from: type=gha,scope=aidbooks-frontend
          cache-to: type=gha,mode=max,scope=aidbooks-frontend

      - name: Configure SSH access to the VPS
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          # Wire up an alias so deploy-k3s.sh's plain `ssh $USER@$HOST` picks
          # up the right key without us threading -i through the script.
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.VPS_HOST }}
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Apply K8s manifests + rollout restart
        env:
          VPS_IP: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: ./scripts/deploy-k3s.sh deploy
